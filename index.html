<!DOCTYPE html>
<html lang ="en">
    <head>
        <meta charset=""UTF-8">
        <meta name="viewport" content = "width=devuce-width, initial-scale=1.0">
        <title>SensorySieve</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel ="stylesheet" href="css/style.css">
        <link rel=""stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dyslexia.css">
    <link rel="stylesheet" href="css/focus.css">
    <link rel="stylesheet" href="css/input.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <h1 class="text-xl font-bold">SensorySieve</h1>
    <p class=""text-sm text-gray-500">Turn any text into something your brain can actually read</p>
  </header>
  <main class = "max-w-3xl mx-auto p-4">
     <div id="input-zone" class="mb-6">
      <p class="text-gray-400">Upload area loading...</p>
    </div>


    <div class="flex gap-6 mb-4">
      <label class="flex items-center gap-2">
        <input type="checkbox" id="dyslexia-toggle">
        Dyslexia Mode
      </label>
      <label class="flex items-center gap-2">
        <input type="checkbox" id="focus-toggle">
        Focus Mode
      </label>
    </div>
     <div id="reader-output" class="bg-white p-4 rounded border min-h-[200px]">
      <p class="text-gray-400">Your text will show up here once you upload something.</p>
    </div>

  </main>

 <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/simplify.js"></script>
  <script src="js/dyslexia.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/hover-define.js"></script>
  <script src="js/focus.js"></script>
  <script src="js/input.js"></script>
</body>
</html>
